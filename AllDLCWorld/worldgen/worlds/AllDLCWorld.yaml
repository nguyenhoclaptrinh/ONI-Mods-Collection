unknownCellsAllowedSubworlds:
  - tagcommand: Default
    command: Replace
    subworldNames:
      - subworlds/sandstone/SandstoneStart

  - tagcommand: DistanceFromTag
    tag: AtStart
    minDistance: 1
    maxDistance: 1
    command: Replace
    subworldNames:
      - subworlds/sandstone/SandstoneMiniAlgae
      - subworlds/forest/ForestMiniWater
      - subworlds/forest/ForestMiniOxy
      - subworlds/forest/ForestMiniMetal

  # Ring-1: Close Biomes (Standard & DLC equivalents)
  - tagcommand: DistanceFromTag
    tag: AtStart
    minDistance: 2
    maxDistance: 2
    command: Replace
    subworldNames:
      - subworlds/forest/Forest
      - subworlds/marsh/HotMarsh
      - subworlds/jungle/Jungle
      - subworlds/ocean/Ocean
      - "dlc4::subworlds/wetlands/WetlandsBasic"
      - "dlc4::subworlds/garden/GardenBasic"
      - "dlc2::subworlds/carrotquarry/CarrotQuarryBasic"

  # Ring-2: Medium Biomes (Colder, Dry, or Swampy)
  - tagcommand: DistanceFromTag
    tag: AtStart
    minDistance: 3
    maxDistance: 3
    command: Replace
    subworldNames:
      - subworlds/frozen/Frozen
      - subworlds/rust/Rust
      - "expansion1::subworlds/swamp/Swamp"
      - "expansion1::subworlds/wasteland/WastelandBeetle"
      - "dlc2::subworlds/sugarwoods/SugarWoodsBasic"
      - "dlc2::subworlds/icecaves/IceCavesBasic"
      - "dlc4::subworlds/raptor/RaptorBasic"

  # Ring-3: Distant & Rare Biomes
  - tagcommand: DistanceFromTag
    tag: AtStart
    minDistance: 4
    maxDistance: 5
    command: Replace
    subworldNames:
      - "expansion1::subworlds/radioactive/Radioactive"
      - "expansion1::subworlds/radioactive/UraniumSprinkles"
      - "expansion1::subworlds/aquatic/OpenWater"
      - "expansion1::subworlds/moo/MooChasms"
      - "expansion1::subworlds/niobium/NiobiumPatch"
      - "expansion1::subworlds/aquatic/GraphiteCaves"
      - subworlds/rust/RustFrozen
      - "expansion1::subworlds/metallic/RenewableMetallic"
      - "expansion1::subworlds/metallic/SwampyRenewableMetallic"
      - "expansion1::subworlds/moo/MooCaverns"
      - "expansion1::subworlds/moo/MooCore"
      - "expansion1::subworlds/regolith/BarrenDust"
      - "expansion1::subworlds/regolith/DeadOasis"
      - "expansion1::subworlds/aquatic/SurfaceBeach"
      - "expansion1::subworlds/wasteland/WastelandBeetleCool"
      - "expansion1::subworlds/wasteland/WastelandWorm"

  # Depth above magma core: Oil field
  - tagcommand: DistanceFromTag
    tag: AtDepths
    minDistance: 1
    maxDistance: 1
    command: Replace
    subworldNames:
      - subworlds/oil/OilPockets
      - "dlc2::subworlds/oil/OilPocketsFossil"

  # Depth core: Magma
  - tagcommand: AtTag
    tag: AtDepths
    command: Replace
    subworldNames:
      - subworlds/magma/VolcanoHole
      - "dlc2::subworlds/magma/LargeMagma"

  # Space Border (highest layer)
  - tagcommand: DistanceFromTag
    tag: AtSurface
    minDistance: 0
    maxDistance: 1
    command: Replace
    subworldNames:
      - "expansion1::subworlds/space/SpaceWithNoBorder"
      - "dlc2::subworlds/space/SpaceWithDebris"

  # Surface (just below space border)
  - tagcommand: DistanceFromTag
    tag: AtSurface
    minDistance: 2
    maxDistance: 2
    command: Replace
    subworldNames:
      - "expansion1::subworlds/space/HospitableClassicSurface"
      - "dlc4::subworlds/space/SpaceWithPrehistoricBorder"

worldTemplateRules:
  # --- MANDATORY GEOTHERMAL & PLOT GEYSERS ---
  # Jungle Geysers
  - names:
      - poi/jungle/geyser_methane
      - poi/jungle/geyser_chlorine
    listRule: GuaranteeOne
    priority: 100
    allowedCellsFilter:
      - command: Replace
        zoneTypes: [ToxicJungle]

  # Marsh Geysers
  - names:
      - poi/hotmarsh/geyser_steam
    listRule: GuaranteeOne
    priority: 100
    allowedCellsFilter:
      - command: Replace
        zoneTypes: [BoggyMarsh]

  # Ocean Salt Water Geysers
  - names:
      - poi/poi_ocean_geyser_saltwater
    listRule: GuaranteeSome
    someCount: 1
    times: 3
    priority: 100 
    allowedCellsFilter:
      - command: Replace
        zoneTypes: [Ocean]

  # Oil Pockets Geysers
  - names:
      - poi/oil/small_oilpockets_geyser_a
      - poi/oil/small_oilpockets_geyser_b
      - poi/oil/small_oilpockets_geyser_c
      - poi/oil/small_oilpockets_geyser_d
    listRule: GuaranteeOne
    times: 4
    useRelaxedFiltering: true
    allowDuplicates: true
    priority: 100
    allowedCellsFilter:
      - command: Replace
        zoneTypes: [OilField]

  # Volcanoes in Magma
  - names:
      - geysers/volcanohole
    listRule: GuaranteeOne
    times: 3
    allowDuplicates: true
    allowExtremeTemperatureOverlap: true
    priority: 200
    allowedCellsFilter:
      - command: Replace
        tagcommand: DistanceFromTag
        tag: AtDepths
        minDistance: 1
        maxDistance: 1

  # Gravitas Office
  - names:
      - "expansion1::poi/genericGravitas/poi_office"
    listRule: GuaranteeAll
    priority: 100
    allowedCellsFilter:
      - command: Replace
        tagcommand: DistanceFromTag
        tag: AtStart
        minDistance: 2
        maxDistance: 99
      - command: ExceptWith
        tagcommand: AtTag
        tag: NoGravitasFeatures

  # --- EXPERIMENT 52B (SAP TREE) ---
  - names:
      - "expansion1::poi/sap_tree_room"
    listRule: GuaranteeAll
    priority: 100
    allowExtremeTemperatureOverlap: true
    allowedCellsFilter:
      - command: Replace
        tagcommand: DistanceFromTag
        tag: AtStart
        minDistance: 4
        maxDistance: 99
      - command: ExceptWith
        tagcommand: AtTag
        tag: NoGravitasFeatures

  # --- URANIUM GEODE (Spaced Out) ---
  - names:
      - "expansion1::poi/radioactive/uranium_geode1"
    listRule: GuaranteeOne
    useRelaxedFiltering: true
    allowExtremeTemperatureOverlap: true
    priority: 200
    allowedCellsFilter:
      - command: Replace
        tagcommand: DistanceFromTag
        tag: AtStart
        minDistance: 4
        maxDistance: 99

  # --- DLC2 GEOTHERMAL CONTROLLER ---
  - names:
      - "dlc2::poi/geothermal/geothermal_controller"
    listRule: GuaranteeAll
    priority: 500
    useRelaxedFiltering: true
    allowExtremeTemperatureOverlap: true
    allowedCellsFilter:
      - command: Replace
        tagcommand: DistanceFromTag
        tag: AtDepths
        minDistance: 2
        maxDistance: 2
      - command: ExceptWith
        tagcommand: DistanceFromTag
        tag: AtEdge
        minDistance: 0
        maxDistance: 0

  # --- DLC2 GEOTHERMAL VENTS (2-3 cái) ---
  - names:
      - "dlc2::poi/geothermal/geothermal_vent_1"
      - "dlc2::poi/geothermal/geothermal_vent_2"
      - "dlc2::poi/geothermal/geothermal_vent_3"
    listRule: GuaranteeRange
    range:
      X: 2
      Y: 3
    priority: 100
    useRelaxedFiltering: true
    allowExtremeTemperatureOverlap: true
    allowDuplicates: true
    allowedCellsFilter:
      - command: Replace
        tagcommand: DistanceFromTag
        tag: AtDepths
        minDistance: 0
        maxDistance: 1
      - command: ExceptWith
        tagcommand: DistanceFromTag
        tag: AtEdge
        minDistance: 0
        maxDistance: 1

  # --- DLC2 JORGE CAMPSITE (Mở khóa đệ Jorge) ---
  - names:
      - "dlc2::poi/ceres/jorge_campsite"
    listRule: GuaranteeAll
    priority: 100
    useRelaxedFiltering: true
    allowedCellsFilter:
      - command: Replace
        tagcommand: DistanceFromTag
        tag: AtStart
        minDistance: 3
        maxDistance: 99

  # --- DLC2 CERES RESEARCH UNLOCK ---
  - names:
      - "dlc2::poi/icecaves/ceres_research_unlock"
    listRule: GuaranteeAll
    priority: 100
    useRelaxedFiltering: true
    allowedCellsFilter:
      - command: Replace
        tagcommand: DistanceFromTag
        tag: AtStart
