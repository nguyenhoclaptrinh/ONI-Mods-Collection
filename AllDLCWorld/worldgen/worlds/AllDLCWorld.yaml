name: STRINGS.WORLDS.ALLDLCWORLD.NAME
description: STRINGS.WORLDS.ALLDLCWORLD.DESCRIPTION
nameTables: [ SANDSTONE ]
asteroidIcon: asteroid_sandstone_kanim
worldTags:
  - Starter
  - Sandstone
requiredDlcIds:
  - EXPANSION1_ID
  - DLC2_ID
  - DLC4_ID

# Massive size: exactly 1.5x width and 1.5x height of standard classic starting world (256x380)
worldsize:
  X: 384
  Y: 570
layoutMethod: PowerTree

worldTraitScale: 0.7

worldTraitRules:
  - min: 1
    max: 3
    forbiddenTags:
      - Surface
      - NonStartWorld

startSubworldName: subworlds/sandstone/SandstoneStart
startingBaseTemplate: bases/sandstoneBase

fixedTraits:
  - sunlightMed
  - cosmicRadiationVeryLow

seasons:
  - ClassicStyleStartMeteorShowers

subworldFiles:
  # --- START & INNER RING ---
  - name: subworlds/sandstone/SandstoneStart
  - name: subworlds/sandstone/SandstoneMiniAlgae
    weight: 1.0
    minCount: 1
  - name: subworlds/forest/ForestMiniWater
    weight: 0.8
    minCount: 1
  - name: subworlds/forest/ForestMiniOxy
    weight: 0.8
    minCount: 1
  - name: subworlds/forest/ForestMiniMetal
    weight: 0.8
    minCount: 1

  # --- MID RING 1 (Close Biomes) ---
  - name: subworlds/forest/Forest
    weight: 1.0
    minCount: 1
  - name: subworlds/marsh/HotMarsh
    weight: 1.0
    minCount: 1
  - name: subworlds/jungle/Jungle
    weight: 1.0
    minCount: 1
  - name: subworlds/ocean/Ocean
    weight: 1.2
    minCount: 1
  - name: "dlc4::subworlds/wetlands/WetlandsBasic"
    weight: 1.0
    minCount: 1
  - name: "dlc4::subworlds/garden/GardenBasic"
    weight: 1.0
    minCount: 1
  - name: "dlc2::subworlds/carrotquarry/CarrotQuarryBasic"
    weight: 1.0
    minCount: 1

  # --- MID RING 2 (Medium distance & colder/specialty biomes) ---
  - name: subworlds/frozen/Frozen
    weight: 1.2
    minCount: 1
  - name: subworlds/rust/Rust
    weight: 1.0
    minCount: 1
  - name: "expansion1::subworlds/swamp/Swamp"
    weight: 1.0
    minCount: 1
  - name: "expansion1::subworlds/wasteland/WastelandBeetle"
    weight: 1.0
    minCount: 1
  - name: "dlc2::subworlds/sugarwoods/SugarWoodsBasic"
    weight: 1.0
    minCount: 1
  - name: "dlc2::subworlds/icecaves/IceCavesBasic"
    weight: 1.2
    minCount: 1
  - name: "dlc4::subworlds/raptor/RaptorBasic"
    weight: 1.0
    minCount: 1

  # --- OUTER RING (Exotic & Rare biomes) ---
  - name: "expansion1::subworlds/radioactive/Radioactive"
    weight: 1.0
    minCount: 1
  - name: "expansion1::subworlds/radioactive/UraniumSprinkles"
    weight: 0.8
    minCount: 1
  - name: "expansion1::subworlds/aquatic/OpenWater"
    weight: 0.8
    minCount: 1
  - name: "expansion1::subworlds/moo/MooChasms"
    weight: 0.8
    minCount: 1
  - name: "expansion1::subworlds/niobium/NiobiumPatch"
    weight: 0.5
    minCount: 1
  - name: "expansion1::subworlds/aquatic/GraphiteCaves"
    weight: 0.5
    minCount: 1
  - name: subworlds/rust/RustFrozen
    weight: 0.8
    minCount: 1

  # --- BOTTOM & TOP LAYERS ---
  - name: subworlds/oil/OilPockets
    weight: 1.5
    minCount: 2
  - name: "dlc2::subworlds/oil/OilPocketsFossil"
    weight: 0.8
    minCount: 1
  - name: subworlds/magma/VolcanoHole
    weight: 1.5
    minCount: 2
  - name: "dlc2::subworlds/magma/LargeMagma"
    weight: 0.8
    minCount: 1
  - name: "expansion1::subworlds/space/SpaceWithNoBorder"
    weight: 2.0
    minCount: 2
  - name: "expansion1::subworlds/space/HospitableClassicSurface"
    weight: 1.0
    minCount: 1
  - name: "dlc2::subworlds/space/SpaceWithDebris"
    weight: 0.8
    minCount: 1
  - name: "dlc4::subworlds/space/SpaceWithPrehistoricBorder"
    weight: 0.8
    minCount: 1

unknownCellsAllowedSubworlds:
  - tagcommand: Default
    command: Replace
    subworldNames:
      - subworlds/sandstone/SandstoneStart

  - tagcommand: DistanceFromTag
    tag: AtStart
    minDistance: 1
    maxDistance: 1
    command: Replace
    subworldNames:
      - subworlds/sandstone/SandstoneMiniAlgae
      - subworlds/forest/ForestMiniWater
      - subworlds/forest/ForestMiniOxy
      - subworlds/forest/ForestMiniMetal

  # Ring-1: Close Biomes (Standard & DLC equivalents)
  - tagcommand: DistanceFromTag
    tag: AtStart
    minDistance: 2
    maxDistance: 2
    command: Replace
    subworldNames:
      - subworlds/forest/Forest
      - subworlds/marsh/HotMarsh
      - subworlds/jungle/Jungle
      - subworlds/ocean/Ocean
      - "dlc4::subworlds/wetlands/WetlandsBasic"
      - "dlc4::subworlds/garden/GardenBasic"
      - "dlc2::subworlds/carrotquarry/CarrotQuarryBasic"

  # Ring-2: Medium Biomes (Colder, Dry, or Swampy)
  - tagcommand: DistanceFromTag
    tag: AtStart
    minDistance: 3
    maxDistance: 3
    command: Replace
    subworldNames:
      - subworlds/frozen/Frozen
      - subworlds/rust/Rust
      - "expansion1::subworlds/swamp/Swamp"
      - "expansion1::subworlds/wasteland/WastelandBeetle"
      - "dlc2::subworlds/sugarwoods/SugarWoodsBasic"
      - "dlc2::subworlds/icecaves/IceCavesBasic"
      - "dlc4::subworlds/raptor/RaptorBasic"

  # Ring-3: Distant & Rare Biomes
  - tagcommand: DistanceFromTag
    tag: AtStart
    minDistance: 4
    maxDistance: 5
    command: Replace
    subworldNames:
      - "expansion1::subworlds/radioactive/Radioactive"
      - "expansion1::subworlds/radioactive/UraniumSprinkles"
      - "expansion1::subworlds/aquatic/OpenWater"
      - "expansion1::subworlds/moo/MooChasms"
      - "expansion1::subworlds/niobium/NiobiumPatch"
      - "expansion1::subworlds/aquatic/GraphiteCaves"
      - subworlds/rust/RustFrozen

  # Depth above magma core: Oil field
  - tagcommand: DistanceFromTag
    tag: AtDepths
    minDistance: 1
    maxDistance: 1
    command: Replace
    subworldNames:
      - subworlds/oil/OilPockets
      - "dlc2::subworlds/oil/OilPocketsFossil"

  # Depth core: Magma
  - tagcommand: AtTag
    tag: AtDepths
    command: Replace
    subworldNames:
      - subworlds/magma/VolcanoHole
      - "dlc2::subworlds/magma/LargeMagma"

  # Space Border (highest layer)
  - tagcommand: DistanceFromTag
    tag: AtSurface
    minDistance: 0
    maxDistance: 1
    command: Replace
    subworldNames:
      - "expansion1::subworlds/space/SpaceWithNoBorder"
      - "dlc2::subworlds/space/SpaceWithDebris"

  # Surface (just below space border)
  - tagcommand: DistanceFromTag
    tag: AtSurface
    minDistance: 2
    maxDistance: 2
    command: Replace
    subworldNames:
      - "expansion1::subworlds/space/HospitableClassicSurface"
      - "dlc4::subworlds/space/SpaceWithPrehistoricBorder"

worldTemplateRules:
  # --- MANDATORY GEOTHERMAL & PLOT GEYSERS ---
  # Jungle Geysers
  - names:
      - poi/jungle/geyser_methane
      - poi/jungle/geyser_chlorine
    listRule: GuaranteeOne
    priority: 100
    allowedCellsFilter:
      - command: Replace
        zoneTypes: [ToxicJungle]

  # Marsh Geysers
  - names:
      - poi/hotmarsh/geyser_steam
    listRule: GuaranteeOne
    priority: 100
    allowedCellsFilter:
      - command: Replace
        zoneTypes: [BoggyMarsh]

  # Ocean Salt Water Geysers
  - names:
      - poi/poi_ocean_geyser_saltwater
    listRule: GuaranteeSome
    someCount: 1
    times: 3
    priority: 100 
    allowedCellsFilter:
      - command: Replace
        zoneTypes: [Ocean]

  # Oil Pockets Geysers
  - names:
      - poi/oil/small_oilpockets_geyser_a
      - poi/oil/small_oilpockets_geyser_b
      - poi/oil/small_oilpockets_geyser_c
      - poi/oil/small_oilpockets_geyser_d
    listRule: GuaranteeOne
    times: 4
    useRelaxedFiltering: true
    allowDuplicates: true
    priority: 100
    allowedCellsFilter:
      - command: Replace
        zoneTypes: [OilField]

  # Volcanoes in Magma
  - names:
      - geysers/volcanohole
    listRule: GuaranteeOne
    times: 3
    allowDuplicates: true
    allowExtremeTemperatureOverlap: true
    priority: 200
    allowedCellsFilter:
      - command: Replace
        tagcommand: DistanceFromTag
        tag: AtDepths
        minDistance: 1
        maxDistance: 1

  # Gravitas Office
  - names:
      - "expansion1::poi/genericGravitas/poi_office"
    listRule: GuaranteeAll
    priority: 100
    allowedCellsFilter:
      - command: Replace
        tagcommand: DistanceFromTag
        tag: AtStart
        minDistance: 2
        maxDistance: 99
      - command: ExceptWith
        tagcommand: AtTag
        tag: NoGravitasFeatures

  # --- EXPERIMENT 52B (SAP TREE) ---
  - names:
      - "expansion1::poi/sap_tree_room"
    listRule: GuaranteeAll
    priority: 100
    allowExtremeTemperatureOverlap: true
    allowedCellsFilter:
      - command: Replace
        tagcommand: DistanceFromTag
        tag: AtStart
        minDistance: 4
        maxDistance: 99
      - command: ExceptWith
        tagcommand: AtTag
        tag: NoGravitasFeatures

  # --- GUARANTEED EXACTLY 1 OF EACH RARE METAL GEYSER ---
  - names: ["expansion1::geysers/molten_aluminum"]
    listRule: GuaranteeOne
    priority: 80
    allowedCellsFilter:
      - command: Replace
        tagcommand: DistanceFromTag
        tag: AtStart
        minDistance: 3
        maxDistance: 99
  - names: ["expansion1::geysers/molten_cobalt"]
    listRule: GuaranteeOne
    priority: 80
    allowedCellsFilter:
      - command: Replace
        tagcommand: DistanceFromTag
        tag: AtStart
        minDistance: 3
        maxDistance: 99
  - names: [geysers/molten_copper]
    listRule: GuaranteeOne
    priority: 80
    allowedCellsFilter:
      - command: Replace
        tagcommand: DistanceFromTag
        tag: AtStart
        minDistance: 3
        maxDistance: 99
  - names: [geysers/molten_gold]
    listRule: GuaranteeOne
    priority: 80
    allowedCellsFilter:
      - command: Replace
        tagcommand: DistanceFromTag
        tag: AtStart
        minDistance: 3
        maxDistance: 99
  - names: [geysers/molten_iron]
    listRule: GuaranteeOne
    priority: 80
    allowedCellsFilter:
      - command: Replace
        tagcommand: DistanceFromTag
        tag: AtStart
        minDistance: 3
        maxDistance: 99

  # --- GUARANTEED EXACTLY 1 OF EACH WATER & SLUSH VENT ---
  - names: [geysers/steam]
    listRule: GuaranteeOne
    priority: 80
    allowedCellsFilter: &MidStartFilter
      - command: Replace
        tagcommand: DistanceFromTag
        tag: AtStart
        minDistance: 2
        maxDistance: 99
  - names: [geysers/hot_steam]
    listRule: GuaranteeOne
    priority: 80
    allowedCellsFilter: *MidStartFilter
  - names: [geysers/hot_water]
    listRule: GuaranteeOne
    priority: 80
    allowedCellsFilter: *MidStartFilter
  - names: [geysers/filthy_water]
    listRule: GuaranteeOne
    priority: 80
    allowedCellsFilter: *MidStartFilter
  - names: [geysers/salt_water]
    listRule: GuaranteeOne
    priority: 80
    allowedCellsFilter: *MidStartFilter
  - names: [geysers/slush_water]
    listRule: GuaranteeOne
    priority: 80
    allowedCellsFilter: *MidStartFilter
  - names: ["expansion1::geysers/slush_salt_water"]
    listRule: GuaranteeOne
    priority: 80
    allowedCellsFilter: *MidStartFilter

  # --- GUARANTEED EXACTLY 1 OF EACH GAS VENT ---
  - names: [geysers/slimy_po2]
    listRule: GuaranteeOne
    priority: 80
    allowedCellsFilter: *MidStartFilter
  - names: [geysers/methane]
    listRule: GuaranteeOne
    priority: 80
    allowedCellsFilter: *MidStartFilter
  - names: [geysers/chlorine_gas]
    listRule: GuaranteeOne
    priority: 80
    allowedCellsFilter: *MidStartFilter
  - names: [geysers/hot_co2]
    listRule: GuaranteeOne
    priority: 80
    allowedCellsFilter: *MidStartFilter
  - names: [geysers/hot_hydrogen]
    listRule: GuaranteeOne
    priority: 80
    allowedCellsFilter: *MidStartFilter

  # --- GUARANTEED EXACTLY 1 OF EACH DLC2 CO2/SULFUR VENT ---
  - names: [geysers/liquid_co2]
    listRule: GuaranteeOne
    priority: 80
    allowedCellsFilter:
      - command: Replace
        tagcommand: DistanceFromTag
        tag: AtStart
        minDistance: 3
        maxDistance: 99
  - names: ["expansion1::geysers/liquid_sulfur"]
    listRule: GuaranteeOne
    priority: 80
    allowedCellsFilter:
      - command: Replace
        tagcommand: DistanceFromTag
        tag: AtStart
        minDistance: 3
        maxDistance: 99
