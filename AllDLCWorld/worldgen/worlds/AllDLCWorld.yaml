name: STRINGS.WORLDS.ALLDLCWORLD.NAME
description: STRINGS.WORLDS.ALLDLCWORLD.DESCRIPTION
nameTables: [ SANDSTONE ]
asteroidIcon: asteroid_sandstone_kanim
worldTags:
  - Starter
  - Sandstone
requiredDlcIds:
  - EXPANSION1_ID
  - DLC2_ID
  - DLC4_ID

# Massive size: exactly 1.5x width and 1.5x height of standard classic starting world (256x380)
worldsize:
  X: 384
  Y: 570
layoutMethod: PowerTree

worldTraitScale: 0.7

worldTraitRules:
  - min: 1
    max: 3
    forbiddenTags:
      - Surface
      - NonStartWorld

startSubworldName: subworlds/sandstone/SandstoneStart
startingBaseTemplate: bases/sandstoneBase

fixedTraits:
  - sunlightMed
  - cosmicRadiationVeryLow

seasons:
  - ClassicStyleStartMeteorShowers
  - PrehistoricMeteorShowers
  - CeresMeteorShowers
